#USER-SUPPLIED VALUES: null
hazelcast-enterprise:
  cluster:
    memberCount: 2
  image:
    pullSecrets:
    - ${SSP_REGISTRY_PULL_SECRET_NAME}
ssp:
  deployment:
    size: demo
  featureFlags:
    dataseed:
      enabled: true
    mcpserver:
      enabled: true
    multiidstore:
      enabled: true
  global:
    drSite: false
    ssp:
      registry:
        existingSecrets:
        - name: ${SSP_REGISTRY_PULL_SECRET_NAME}
  db:
    serviceHost: mysql-primary.ssp.svc.cluster.local
    servicePort: 3306
    name: iamauth
    user: iamauth
    # Chart reads ssp.db.existingSecret (not passwordSecret). Default is <release>-db-pxc, e.g. ssp-ssp-db-pxc.
    existingSecret: mysql-credentials   # must include key mysql-password (see Bitnami mysql SealedSecret)

  ingress:
    host: ssp.id-broadcom.com
    ingressClassName: nginx
    tls:
      secretName: ${SSP_GENERAL_TLS_SECRET_NAME}
    type: nginx
