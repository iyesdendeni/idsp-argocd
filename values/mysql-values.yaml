# Bitnami chart v12+: required if using bitnamilegacy images or if the chart flags oci.bitnami.com images.
# See https://github.com/bitnami/charts/issues/30850
global:
  security:
    allowInsecureImages: true

# Alternative: use Docker Hub bitnamilegacy (frozen images) — keep allowInsecureImages above.
#image:
#  registry: docker.io
#  repository: bitnamilegacy/mysql
#  tag: 8.4.5-debian-12-r0

image:
  registry: oci.bitnami.com
  repository: bitnami/mysql
  tag: 8.4.5-debian-12-r0

architecture: replication

auth:
  existingSecret: mysql-credentials   # K8s Secret with keys: mysql-root-password, mysql-password, mysql-replication-password
  database: iamauth
  username: iamauth

primary:
  persistence:
    enabled: true
    storageClass: premium-rwo
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  extraConfiguration: |-
    [mysqld]
    innodb_buffer_pool_size=1G
    max_connections=200
    character-set-server=utf8mb4

# Enable read replicas
secondary:
  replicaCount: 2
  persistence:
    enabled: true
    storageClass: premium-rwo
    size: 50Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

metrics:
  enabled: false
  serviceMonitor:
    enabled: false