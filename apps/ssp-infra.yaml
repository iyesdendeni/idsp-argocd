apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssp-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  destination:
    namespace: ssp
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: ssp-infra
      repoURL: https://ssp-helm-charts-staging.storage.googleapis.com
      targetRevision: 4.0.0-1144.stage
      helm:
        valueFiles: 
        - $values/values/ssp-infra-values.yaml
    - repoURL: https://github.com/iyesdendeni/idsp-argocd.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/iyesdendeni/idsp-argocd.git
      targetRevision: main
      path: manifests/ssp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true