apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ssp
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: ssp
      repoURL: ${SSP_HELM_REPO_URL}
      targetRevision: ${CHART_VERSION}
      helm:
        valueFiles:
          - $values/values/ssp-values.yaml
        # Ensures external DB secret is used (default chart name is <release>-db-pxc). Overrides if values ref lags.
        parameters:
          - name: ssp.db.existingSecret
            value: mysql-credentials
    - repoURL: ${GIT_REPO_URL}
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
