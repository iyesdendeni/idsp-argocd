apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cadirectory
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ssp
    server: https://kubernetes.default.svc
  project: default
  sources:
    # Chart versions like 4.0.0-*.stage live on the root index, not .../ssp-maint-patch
    - chart: ssp-symantec-dir
      repoURL: https://ssp-helm-charts-staging.storage.googleapis.com
      targetRevision: 4.0.0-1144.stage
      helm:
        releaseName: ssp-symantec-dir
        valueFiles:
          - $values/values/cadirectory-values.yaml
    - repoURL: https://github.com/iyesdendeni/idsp-argocd.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
