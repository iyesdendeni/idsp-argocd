apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx                           # this is the name of the application in the argocd server, it should be unique globally
  namespace: argocd                             # namespace where the application will be deployed
  annotations:
    argocd.argoproj.io/sync-wave: "1"           # sync wave of the application
  finalizers:                                   # list of finalizers, used to ensure that the application is deleted correctly
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ingress                          # namespace where the application will be deployed
    server: https://kubernetes.default.svc
  project: default                              # project where the application will be deployed
  sources:
    - chart: ingress-nginx
      repoURL: https://kubernetes.github.io/ingress-nginx  # repository URL of the application
      targetRevision: 4.14.0
      helm:
        valueFiles:
          - $values/values/ingress-values.yaml
    - repoURL: ${GIT_REPO_URL}
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true                               # remove cluster resources that are no longer present in the source after the sync
      selfHeal: true                            # revert manual changes made to the cluster resources after the sync
    syncOptions:                                # sync options, used to sync the application
      - CreateNamespace=true                  # create the namespace if it does not exist
