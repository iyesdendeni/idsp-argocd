apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ssp
    server: https://kubernetes.default.svc
  project: default
  # Chart TLS Secret: live cert bytes often differ from rendered manifest (regen, PEM normalization).
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: sample-app-ssp-sample-app-spi-demo-tls
      namespace: ssp
      jsonPointers:
        - /data
  sources:
    - chart: ssp-sample-app
      repoURL: ${SSP_HELM_REPO_URL}
      targetRevision: ${CHART_VERSION}
      helm:
        valueFiles:
          - $values/values/sample-app-values.yaml
    - repoURL: ${GIT_REPO_URL}
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
