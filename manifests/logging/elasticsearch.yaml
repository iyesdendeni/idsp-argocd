apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: logging
  labels:
    app: elasticsearch-master
spec:
  version: 9.2.1
  nodeSets:
    - name: default
      count: 1
      config:
        node.roles:
          - master
          - data
        node.store.allow_mmap: false
      podTemplate:
        metadata:
          labels:
            app: elasticsearch-master
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 4Gi
                  cpu: "1"
                limits:
                  memory: 4Gi
                  cpu: "1"
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
  volumeClaimDeletePolicy: DeleteOnScaledownOnly
  auth:
    fileRealm:
      - secretName: kibana-user   # created via kubeseal from kibana-user-sealed-secret.yaml
